<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DropChat — Ephemeral Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #60d394; --accent2: #c77dff; --text: #e2e2f0;
    --muted: #5a5a7a; --danger: #ff6b6b;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(96,211,148,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,211,148,0.03) 1px, transparent 1px);
    background-size: 40px 40px; animation: gridMove 20s linear infinite; pointer-events: none;
  }
  @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; animation: float 8s ease-in-out infinite; }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
  @keyframes float { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
  .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 2rem; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .logo { text-align: center; margin-bottom: 2.5rem; }
  .logo-icon { font-size: 3rem; display: block; margin-bottom: 0.75rem; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .logo h1 {
    font-size: 2.5rem; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo p { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; font-family: 'Space Mono', monospace; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.75rem; font-family: 'Space Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  input[type="text"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.85rem 1rem; color: var(--text); font-size: 1rem; font-family: 'Syne', sans-serif;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(96,211,148,0.1); }
  input[type="text"]::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 0.9rem; background: var(--accent); color: #0a0a0f;
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
    font-family: 'Syne', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 0.5rem;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(96,211,148,0.3); }
  .btn:active { transform: translateY(0); }
  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--muted); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-random {
    width: 100%; padding: 0.75rem; background: transparent; color: var(--accent2);
    border: 1px solid var(--accent2); border-radius: 8px; font-size: 0.9rem;
    font-family: 'Space Mono', monospace; cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .btn-random:hover { background: rgba(199,125,255,0.1); transform: translateY(-2px); }
  .features { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 2rem; }
  .feature {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.85rem 1rem; font-size: 0.8rem; color: var(--muted);
    display: flex; align-items: center; gap: 0.5rem; animation: fadeUp 0.6s ease both;
  }
  .feature:nth-child(1){animation-delay:0.1s} .feature:nth-child(2){animation-delay:0.15s}
  .feature:nth-child(3){animation-delay:0.2s} .feature:nth-child(4){animation-delay:0.25s}
  .error-msg { color: var(--danger); font-size: 0.8rem; font-family: 'Space Mono', monospace; margin-top: 0.4rem; display: none; }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="container">
    <div class="logo">
      <span class="logo-icon">💬</span>
      <h1>DropChat</h1>
      <p>// no account. no trace. just chat.</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Your Name (optional)</label>
        <input type="text" id="userName" placeholder="Anonymous" maxlength="20"/>
      </div>
      <div class="field">
        <label>Room Name</label>
        <input type="text" id="roomName" placeholder="e.g. my-secret-room" maxlength="40"/>
        <div class="error-msg" id="roomError">Only letters, numbers, hyphens allowed</div>
      </div>
      <button class="btn" onclick="joinRoom()">Enter Room →</button>
      <div class="divider">or</div>
      <button class="btn-random" onclick="randomRoom()">🎲 Generate Random Room</button>
    </div>
    <div class="features">
      <div class="feature">🔒 No login needed</div>
      <div class="feature">⚡ Real-time sync</div>
      <div class="feature">📁 File & media sharing</div>
      <div class="feature">💨 Auto-delete in 30min</div>
    </div>
  </div>
<script>
  const adjs = ['swift','silent','hidden','dark','neon','fuzzy','cosmic','stealth','echo','nova'];
  const nouns = ['panda','fox','cipher','ghost','spark','orbit','drift','pulse','wave','node'];
  function randomRoom() {
    const a = adjs[Math.floor(Math.random()*adjs.length)];
    const n = nouns[Math.floor(Math.random()*nouns.length)];
    document.getElementById('roomName').value = `${a}-${n}-${Math.floor(Math.random()*999)}`;
  }
  function joinRoom() {
    const name = document.getElementById('userName').value.trim();
    const room = document.getElementById('roomName').value.trim();
    const err = document.getElementById('roomError');
    if (!room) { document.getElementById('roomName').focus(); return; }
    if (!/^[a-zA-Z0-9_-]+$/.test(room)) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    window.location.href = `/${room}${name ? '?name='+encodeURIComponent(name) : ''}`;
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
  document.getElementById('roomName').addEventListener('input', () => { document.getElementById('roomError').style.display='none'; });
</script>
</body>
</html>
