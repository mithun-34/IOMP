<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DropChat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
    --border: #1e1e2e; --accent: #60d394; --accent2: #c77dff;
    --text: #e2e2f0; --muted: #5a5a7a; --danger: #ff6b6b;
  }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.5rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .header-back { color: var(--muted); text-decoration: none; font-size: 1.1rem; transition: color 0.2s; }
  .header-back:hover { color: var(--accent); }
  .header-room { display: flex; flex-direction: column; flex: 1; }
  .header-room-name { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 0.5rem; }
  .room-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-sub { font-size: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
  .header-users { display: flex; align-items: center; gap: 0.5rem; }
  .user-pill {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: #0a0a0f; cursor: default;
    transition: transform 0.2s; border: 2px solid var(--bg);
  }
  .user-pill:hover { transform: translateY(-3px); }
  .count-badge {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 0.25rem 0.6rem; font-size: 0.75rem; font-family: 'Space Mono', monospace; color: var(--muted);
  }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: width 0.3s; overflow: hidden;
  }
  .sidebar-title {
    padding: 1rem; font-size: 0.7rem; font-family: 'Space Mono', monospace;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .sidebar-users { flex: 1; overflow-y: auto; padding: 0.5rem; }
  .sidebar-user {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.6rem;
    border-radius: 8px; transition: background 0.15s; font-size: 0.85rem;
  }
  .sidebar-user:hover { background: var(--surface2); }
  .sidebar-user-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .you-tag { font-size: 0.65rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ── Chat area ── */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages {
    flex: 1; overflow-y: auto; padding: 1.5rem; display: flex;
    flex-direction: column; gap: 0.75rem; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* message bubbles */
  .msg { display: flex; gap: 0.75rem; animation: msgIn 0.25s ease both; }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.own { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 0.75rem; font-weight: 700; color: #0a0a0f; flex-shrink: 0;
  }
  .msg-body { max-width: 70%; display: flex; flex-direction: column; gap: 0.25rem; }
  .msg.own .msg-body { align-items: flex-end; }
  .msg-meta { display: flex; align-items: center; gap: 0.5rem; }
  .msg-name { font-size: 0.78rem; font-weight: 600; }
  .msg-time { font-size: 0.68rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .msg-bubble {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 4px;
    padding: 0.65rem 0.9rem; font-size: 0.9rem; line-height: 1.5; word-break: break-word;
  }
  .msg.own .msg-bubble { background: var(--surface2); border-radius: 12px 12px 4px 12px; }

  /* system messages */
  .sys-msg {
    text-align: center; font-size: 0.75rem; color: var(--muted);
    font-family: 'Space Mono', monospace; padding: 0.25rem 0;
  }
  .sys-msg span {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.2rem 0.75rem;
  }

  /* file messages */
  .file-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; max-width: 280px;
  }
  .file-card img, .file-card video {
    width: 100%; max-height: 200px; object-fit: cover; display: block;
  }
  .file-info { padding: 0.6rem 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .file-icon { font-size: 1.2rem; }
  .file-name { font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .file-size { font-size: 0.7rem; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .file-dl { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
  .file-dl:hover { text-decoration: underline; }

  /* typing indicator */
  .typing-indicator {
    padding: 0 1.5rem 0.5rem; font-size: 0.78rem; color: var(--muted);
    font-family: 'Space Mono', monospace; height: 1.5rem; flex-shrink: 0;
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex; align-items: flex-end; gap: 0.75rem; padding: 1rem 1.5rem;
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-actions { display: flex; gap: 0.5rem; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 8px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
    transition: color 0.2s, border-color 0.2s, background 0.2s; flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(96,211,148,0.07); }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-size: 0.95rem;
    font-family: 'Syne', sans-serif; outline: none; resize: none; line-height: 1.4;
    max-height: 120px; min-height: 42px; overflow-y: auto;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(96,211,148,0.08); }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 10px; background: var(--accent);
    border: none; color: #0a0a0f; font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s; font-weight: 700;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(96,211,148,0.4); }
  .send-btn:active { transform: scale(0.95); }

  /* upload progress */
  .upload-bar {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.75rem 1.25rem; display: none; gap: 0.75rem; align-items: center;
    min-width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 100;
  }
  .upload-bar.active { display: flex; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; width: 0%; }
  .upload-label { font-size: 0.8rem; font-family: 'Space Mono', monospace; color: var(--muted); white-space: nowrap; }

  /* toast */
  .toast {
    position: fixed; top: 1rem; right: 1rem; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.85rem; z-index: 999;
    animation: slideIn 0.3s ease; display: none;
  }
  .toast.show { display: block; }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  /* responsive */
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .msg-body { max-width: 85%; }
  }

  #fileInput { display: none; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.85rem;
    text-align: center;
  }
  .empty-state .big { font-size: 2.5rem; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <a href="/" class="header-back" title="Back to lobby">←</a>
  <div class="header-room">
    <div class="header-room-name">
      <span class="room-dot"></span>
      <span id="headerRoomName">#loading...</span>
    </div>
    <div class="header-sub" id="headerSub">connecting...</div>
  </div>
  <div class="header-users" id="headerUsers"></div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Members</div>
    <div class="sidebar-users" id="sidebarUsers"></div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big">💬</div>
        <div>No messages yet.</div>
        <div>Share the URL to invite others!</div>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-bar">
      <div class="input-actions">
        <button class="icon-btn" title="Attach file" onclick="document.getElementById('fileInput').click()">📎</button>
      </div>
      <div class="input-wrap">
        <textarea id="msgInput" placeholder="Type a message..." rows="1"
          oninput="autoResize(this); handleTyping()"
          onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()" title="Send">↑</button>
    </div>
  </div>
</div>

<!-- Upload progress -->
<div class="upload-bar" id="uploadBar">
  <span class="upload-label" id="uploadLabel">Uploading...</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*,video/*,.pdf,.zip,.txt,.mp3,.wav"
  onchange="handleFileUpload(this.files[0])"/>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Init ──────────────────────────────────────────────────────────────────────
const roomName = location.pathname.slice(1).toLowerCase();
const urlParams = new URLSearchParams(location.search);
const userName = urlParams.get('name') || '';

document.title = `#${roomName} — DropChat`;
document.getElementById('headerRoomName').textContent = `#${roomName}`;

const socket = io();
let selfUser = null;
let typingTimer = null;
let isTyping = false;
let typingUsers = {};

// ── Join ──────────────────────────────────────────────────────────────────────
socket.on('connect', () => {
  document.getElementById('headerSub').textContent = 'connected · files auto-delete in 30min';
  socket.emit('join', { roomName, userName });
});

socket.on('disconnect', () => {
  document.getElementById('headerSub').textContent = '⚠ disconnected — reconnecting...';
});

socket.on('self', user => { selfUser = user; });

socket.on('history', msgs => {
  msgs.forEach(m => {
    if (m.type === 'system') renderSystem(m);
    else renderMessage(m);
  });
  scrollBottom();
});

socket.on('message', msg => { renderMessage(msg); scrollBottom(); });
socket.on('system', msg => { renderSystem(msg); scrollBottom(); });

socket.on('room-update', ({ count, users }) => {
  document.getElementById('headerSub').textContent =
    `${count} member${count !== 1 ? 's' : ''} online · files auto-delete in 30min`;
  renderUsers(users, count);
});

socket.on('typing', ({ user, isTyping }) => {
  if (isTyping) typingUsers[user.id] = user.name;
  else delete typingUsers[user.id];
  const names = Object.values(typingUsers);
  const el = document.getElementById('typingIndicator');
  if (names.length === 0) el.textContent = '';
  else if (names.length === 1) el.textContent = `${names[0]} is typing...`;
  else el.textContent = `${names.slice(0,-1).join(', ')} and ${names.at(-1)} are typing...`;
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderMessage(msg) {
  const el = document.getElementById('emptyState');
  if (el) el.remove();

  const container = document.getElementById('messages');
  const isOwn = selfUser && msg.user.id === selfUser.id;
  const div = document.createElement('div');
  div.className = `msg${isOwn ? ' own' : ''}`;

  const initials = msg.user.name.slice(0,2).toUpperCase();
  let contentHtml = '';

  if (msg.type === 'text') {
    contentHtml = `<div class="msg-bubble">${escapeHtml(msg.text)}</div>`;
  } else if (msg.type === 'file') {
    contentHtml = renderFileCard(msg.file);
  }

  div.innerHTML = `
    <div class="msg-avatar" style="background:${msg.user.color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name" style="color:${msg.user.color}">${escapeHtml(msg.user.name)}</span>
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>
      ${contentHtml}
    </div>`;
  container.appendChild(div);
}

function renderFileCard(file) {
  const isImage = file.mimetype && file.mimetype.startsWith('image/');
  const isVideo = file.mimetype && file.mimetype.startsWith('video/');
  const sizeStr = formatSize(file.size);

  let preview = '';
  if (isImage) preview = `<img src="${file.url}" alt="${escapeHtml(file.originalName)}" loading="lazy" onclick="window.open('${file.url}','_blank')" style="cursor:pointer"/>`;
  else if (isVideo) preview = `<video src="${file.url}" controls></video>`;

  return `<div class="file-card">
    ${preview}
    <div class="file-info">
      <span class="file-icon">${fileIcon(file.mimetype)}</span>
      <span class="file-name">${escapeHtml(file.originalName)}</span>
      <span class="file-size">${sizeStr}</span>
      <a href="${file.url}" download="${escapeHtml(file.originalName)}" class="file-dl">↓</a>
    </div>
  </div>`;
}

function renderSystem(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.innerHTML = `<span>${escapeHtml(msg.text)}</span>`;
  container.appendChild(div);
}

function renderUsers(users, count) {
  // Header avatars (show up to 5)
  const headerEl = document.getElementById('headerUsers');
  const shown = users.slice(0, 5);
  headerEl.innerHTML = shown.map(u => `
    <div class="user-pill" style="background:${u.color}" title="${escapeHtml(u.name)}">
      ${u.name.slice(0,2).toUpperCase()}
    </div>`).join('') + (count > 5 ? `<span class="count-badge">+${count-5}</span>` : '');

  // Sidebar
  const sideEl = document.getElementById('sidebarUsers');
  sideEl.innerHTML = users.map(u => `
    <div class="sidebar-user">
      <div class="sidebar-user-dot" style="background:${u.color}"></div>
      <span class="sidebar-user-name">${escapeHtml(u.name)}</span>
      ${selfUser && u.id === selfUser.id ? '<span class="you-tag">(you)</span>' : ''}
    </div>`).join('');
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('message', { text });
  input.value = '';
  autoResize(input);
  stopTyping();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function handleTyping() {
  if (!isTyping) { isTyping = true; socket.emit('typing', true); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (isTyping) { isTyping = false; socket.emit('typing', false); }
  clearTimeout(typingTimer);
}

// ── File Upload ───────────────────────────────────────────────────────────────
async function handleFileUpload(file) {
  if (!file) return;
  if (file.size > 50 * 1024 * 1024) { showToast('❌ File too large (max 50MB)'); return; }

  const bar = document.getElementById('uploadBar');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('uploadLabel');
  bar.classList.add('active');
  label.textContent = `Uploading ${file.name}...`;
  fill.style.width = '0%';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        fill.style.width = `${Math.round(e.loaded / e.total * 100)}%`;
      }
    };

    xhr.onload = () => {
      bar.classList.remove('active');
      document.getElementById('fileInput').value = '';
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        socket.emit('file-message', data);
        showToast('✅ File shared!');
      } else {
        showToast('❌ Upload failed');
      }
    };

    xhr.onerror = () => { bar.classList.remove('active'); showToast('❌ Upload error'); };
    xhr.send(formData);
  } catch (err) {
    bar.classList.remove('active');
    showToast('❌ Upload failed');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function fileIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.includes('pdf')) return '📕';
  if (mime.includes('zip')) return '🗜️';
  return '📄';
}

function showToast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// Drag & drop on the whole window
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) handleFileUpload(file);
});

// Copy URL to share
document.getElementById('headerRoomName').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href).then(() => showToast('🔗 Room URL copied!'));
});
document.getElementById('headerRoomName').style.cursor = 'pointer';
document.getElementById('headerRoomName').title = 'Click to copy room URL';
</script>
</body>
</html>
